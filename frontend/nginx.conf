# ── Frontend 컨테이너 내부 nginx 설정 ─────────────────────────
# React SPA 라우팅: 모든 경로를 index.html 로 fallback
# 이 파일은 blog-frontend 컨테이너 전용입니다.
# 외부 진입점(리버스 프록시)은 ./nginx/nginx.conf 를 사용하세요.
# ──────────────────────────────────────────────────────────────

server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # React Router — 모든 경로를 index.html 로 처리
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite 번들 정적 자산: 브라우저 장기 캐시
    # (파일명에 해시가 포함되므로 캐시 무효화 자동 처리)
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
