# ════════════════════════════════════════════════════════════════
# Nginx 리버스 프록시 설정 — blog-nginx 컨테이너
#
# 라우팅 규칙:
#   /api/*   → blog-backend:4000  (Express API)
#   /health  → blog-backend:4000  (헬스체크)
#   /        → blog-frontend:80   (React SPA)
# ════════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    keepalive_timeout  65;

    # 파일 업로드 최대 크기 (Tiptap 이미지 업로드 대비)
    client_max_body_size  20m;

    # Gzip 압축
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json
                      application/javascript text/xml application/xml
                      image/svg+xml;

    # ── 업스트림 서비스 ────────────────────────────────────────
    upstream backend {
        server  backend:4000;
        keepalive 16;
    }

    upstream frontend {
        server  frontend:80;
        keepalive 16;
    }

    # ── HTTP 서버 ─────────────────────────────────────────────
    server {
        listen  80;
        server_name  _;   # 모든 도메인 수신 (도메인 확정 후 변경)

        # ── /api/* → Express 백엔드 ─────────────────────────
        # /api/ 경로 그대로 전달 (backend는 /api/posts 등으로 마운트됨)
        location /api/ {
            proxy_pass          http://backend;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Connection        "";

            # HttpOnly 쿠키 SameSite 헤더 유지 (JWT refresh token)
            proxy_cookie_flags  ~ httponly samesite=lax;

            # 타임아웃
            proxy_read_timeout  30s;
            proxy_send_timeout  30s;
        }

        # ── /health → 백엔드 헬스체크 ───────────────────────
        location /health {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # ── / → React SPA ────────────────────────────────────
        location / {
            proxy_pass          http://frontend;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    Connection        "";
        }
    }

    # ════════════════════════════════════════════════════════════
    # HTTPS 설정 (도메인 확보 + Certbot 인증서 발급 후 주석 해제)
    # ════════════════════════════════════════════════════════════
    # server {
    #     listen 443 ssl http2;
    #     server_name  yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #
    #     # HTTP → HTTPS 리다이렉트는 80 블록에 추가:
    #     # return 301 https://$host$request_uri;
    #
    #     location /api/ { ... }  # 위와 동일
    #     location /      { ... }  # 위와 동일
    # }
}
